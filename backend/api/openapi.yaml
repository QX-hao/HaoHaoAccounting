      additionalProperties: false
      required: [category, amount]
      properties:
        categoryId:
          type: integer
        category:
          type: string
        amount:
          type: number
    AccountStat:
      type: object
      additionalProperties: false
      required: [account, amount]
      properties:
        accountId:
          type: integer
        account:
          type: string
        amount:
          type: number
    MonthTrend:
      type: object
      additionalProperties: false
