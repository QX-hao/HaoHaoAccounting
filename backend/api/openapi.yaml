        '504':
          $ref: '#/components/responses/GatewayTimeout'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    RequestID:
      name: X-Request-ID
      in: header
      required: false
      description: Optional request correlation id. The API trims surrounding whitespace and returns the normalized value when valid, otherwise it generates one.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[!-~]+$'
      example: client-request-123
  headers:
    RequestID:
      description: Request correlation id for tracing logs and API calls.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[!-~]+$'
      example: client-request-123
    Link:
      description: RFC 8288 pagination links for first, previous, next, and last pages when available.
      schema:
        type: string
      example: </api/v1/transactions?page=2&pageSize=20>; rel="next", </api/v1/transactions?page=5&pageSize=20>; rel="last"
    TotalCount:
      description: Total number of records matching the query before pagination.
      schema:
        type: integer
        minimum: 0
      example: 95
    ContentDisposition:
      description: Attachment disposition for downloaded files. Includes both filename and RFC 5987 filename* parameters.
      schema:
        type: string
      example: attachment; filename="transactions.csv"; filename*=UTF-8''transactions.csv
    CacheControl:
      description: Cache policy for API responses containing user or authentication data.
      schema:
        type: string
        enum: [no-store]
      example: no-store
    Pragma:
      description: Legacy HTTP/1.0 cache policy retained for intermediary compatibility.
      schema:
        type: string
        enum: [no-cache]
      example: no-cache
    Expires:
      description: Legacy cache expiry value retained for intermediary compatibility.
      schema:
        type: string
        enum: ['0']
      example: '0'
    Vary:
      description: Negotiated API responses vary on the Accept request header.
      schema:
        type: string
        enum: [Accept]
    Allow:
      description: HTTP methods supported by the target route.
      schema:
        type: string
      example: GET, POST
    WWWAuthenticate:
      description: Authentication challenge for protected resources. Challenges use realm="haohao-accounting-api"; invalid bearer tokens also include error="invalid_token" and error_description per RFC 6750.
      schema:
        type: string
      example: Bearer realm="haohao-accounting-api", error="invalid_token", error_description="The access token is missing, expired, revoked, or invalid"
    RetryAfter:
      description: Remaining wait time before retrying, as either HTTP-date or delay-seconds.
      schema:
        type: string
      example: '60'
  responses:
    BadRequest:
      description: Bad request or validation error.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: validation failed
            code: bad_request
            requestId: api-20260620-example
    Unauthorized:
      description: Missing, invalid, or expired authentication token.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
        WWW-Authenticate:
          $ref: '#/components/headers/WWWAuthenticate'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: invalid Authorization format
            code: unauthorized
            requestId: api-20260620-example
    Forbidden:
      description: Authenticated user cannot perform this action.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource was not found.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    MethodNotAllowed:
      description: HTTP method is not supported for this route.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
        Allow:
          $ref: '#/components/headers/Allow'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Too many requests.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PayloadTooLarge:
      description: Request body is too large.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnsupportedMediaType:
      description: Request Content-Type is not supported by this operation.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotAcceptable:
      description: Requested response media type is not available for this operation.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        Vary:
          $ref: '#/components/headers/Vary'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    GatewayTimeout:
      description: Request processing exceeded the server timeout budget.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error:
      description: Error response. Prefer a status-specific response component when possible.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Ok:
      description: OK response
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        Vary:
          $ref: '#/components/headers/Vary'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OkResponse'
  schemas:
    TransactionType:
      type: string
      enum: [income, expense]
    CurrentUser:
      type: object
      additionalProperties: false
      required: [id, name, username, phone, email, wechatId]
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        phone:
          type: string
        email:
          type: string
        wechatId:
          type: string
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      example:
        username: admin
        password: example-password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    LoginResponse:
      type: object
      additionalProperties: false
      required: [token, user]
      example:
        token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.signature
        user:
          id: 1
          name: 好好用户
          username: admin
          phone: ''
          email: ''
          wechatId: ''
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/CurrentUser'
    Account:
      type: object
      additionalProperties: false
      required: [id, userId, name, type, balance, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        type:
          type: string
        balance:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AccountRequest:
      type: object
      additionalProperties: false
      required: [name, type]
      example:
        name: 招商银行卡
        type: debit
        balance: 1200.5
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          minLength: 1
        balance:
          type: number
          minimum: 0
          multipleOf: 0.01
    Budget:
      type: object
      additionalProperties: false
      required: [id, userId, month, categoryId, amount, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
