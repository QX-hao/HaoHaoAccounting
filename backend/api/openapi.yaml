components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Send the access token as `Authorization: Bearer <JWT>`. At runtime, repeated `Authorization` headers are rejected, and issued JWTs include an `nbf` not-before claim.
  parameters:
    Id:
      name: id
      in: path
      required: true
      description: Positive resource identifier.
      schema:
        type: integer
        minimum: 1
      example: 1
    RequestID:
      name: X-Request-ID
      in: header
      required: false
      description: Optional request correlation id. The API trims surrounding whitespace and returns the normalized value when valid, otherwise it generates one.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[!-~]+$'
      example: client-request-123
  headers:
    RequestID:
      description: Request correlation id for tracing logs and API calls.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[!-~]+$'
      example: client-request-123
    Link:
      description: RFC 8288 pagination links for first, previous, next, and last pages when available; sensitive query parameters are omitted from generated links.
      schema:
        type: string
      example: </api/v1/transactions?page=2&pageSize=20>; rel="next", </api/v1/transactions?page=5&pageSize=20>; rel="last"
    TotalCount:
      description: Total number of records matching the query before pagination.
      schema:
        type: integer
        minimum: 0
      example: 95
    ContentDisposition:
      description: Attachment disposition for downloaded files. Includes both filename and RFC 5987 filename* parameters.
      schema:
        type: string
      example: attachment; filename="transactions.csv"; filename*=UTF-8''transactions.csv
    Location:
      description: Relative URL of the created or queued API resource.
      schema:
        type: string
      example: /api/v1/io/import/jobs/1
    CacheControl:
      description: Cache policy for API responses containing user or authentication data.
      schema:
        type: string
        enum: [no-store]
      example: no-store
    Pragma:
      description: Legacy HTTP/1.0 cache policy retained for intermediary compatibility.
      schema:
        type: string
        enum: [no-cache]
      example: no-cache
    Expires:
      description: Legacy cache expiry value retained for intermediary compatibility.
      schema:
        type: string
        enum: ['0']
      example: '0'
    Vary:
      description: Response cache keys vary by negotiated response and CORS request headers.
      schema:
        type: string
      example: Accept, Origin, Access-Control-Request-Method, Access-Control-Request-Headers
    Allow:
      description: Comma-separated HTTP methods supported by the target route.
      schema:
        type: string
      example: GET, POST
    ClearSiteData:
      description: Browser-side data cleared after logout for this origin.
      schema:
        type: string
      example: '"cache", "cookies", "storage"'
    WWWAuthenticate:
      description: Authentication challenge for protected resources. Challenges use realm="haohao-accounting-api"; invalid bearer tokens also include error="invalid_token" and error_description per RFC 6750.
      schema:
        type: string
      example: Bearer realm="haohao-accounting-api", error="invalid_token", error_description="The access token is missing, expired, revoked, or invalid"
    RetryAfter:
      description: Remaining wait time before retrying, as either HTTP-date or non-negative integer delay-seconds.
      schema:
        type: string
      example: '60'
    RateLimitLimit:
      description: Maximum number of failed login attempts permitted in the active rate-limit window.
      schema:
        type: integer
        minimum: 1
      example: 5
    RateLimitRemaining:
      description: Remaining failed login attempts before the client is blocked.
      schema:
        type: integer
        minimum: 0
      example: 0
    RateLimitReset:
      description: Delay in seconds until the active rate-limit window resets.
      schema:
        type: integer
        minimum: 0
      example: 60
