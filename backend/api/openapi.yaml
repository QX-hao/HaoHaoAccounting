        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
  /ai/parse:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    post:
      tags: [ai]
      operationId: postAiParse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIParseRequest'
      responses:
        '200':
          description: Parsed ledger text
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
