  schemas:
    TransactionType:
      type: string
      enum: [income, expense]
    CurrentUser:
      type: object
      additionalProperties: false
      required: [id, name, username, phone, email, wechatId]
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        phone:
          type: string
        email:
          type: string
        wechatId:
          type: string
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      example:
        username: admin
        password: example-password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
          format: password
          writeOnly: true
    LoginResponse:
      type: object
      additionalProperties: false
      required: [token, user]
      example:
        token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.signature
        user:
          id: 1
          name: 好好用户
          username: admin
          phone: ''
          email: ''
          wechatId: ''
      properties:
        token:
          type: string
          readOnly: true
        user:
          $ref: '#/components/schemas/CurrentUser'
    Account:
      type: object
      additionalProperties: false
      required: [id, userId, name, type, balance, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        type:
          type: string
        balance:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AccountRequest:
      type: object
      additionalProperties: false
      required: [name, type]
      example:
        name: 招商银行卡
        type: debit
        balance: 1200.5
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          minLength: 1
        balance:
          type: number
          minimum: 0
          multipleOf: 0.01
    Budget:
      type: object
      additionalProperties: false
      required: [id, userId, month, categoryId, amount, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        month:
          type: string
        categoryId:
          type: integer
        amount:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BudgetRequest:
      type: object
      additionalProperties: false
      required: [month, categoryId, amount]
      properties:
        month:
          type: string
          pattern: '^\d{4}-\d{2}$'
        categoryId:
          type: integer
          minimum: 1
        amount:
          type: number
          exclusiveMinimum: 0
          multipleOf: 0.01
    Category:
      type: object
      additionalProperties: false
      required: [id, name, type, isSystem, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        type:
          $ref: '#/components/schemas/TransactionType'
        isSystem:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CategoryRequest:
      type: object
      additionalProperties: false
      required: [name, type]
      properties:
        name:
          type: string
          minLength: 1
        type:
          $ref: '#/components/schemas/TransactionType'
    Transaction:
      type: object
      additionalProperties: false
      required: [id, userId, type, amount, categoryId, accountId, note, tags, source, occurredAt, category, account, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          $ref: '#/components/schemas/TransactionType'
        amount:
          type: number
        categoryId:
          type: integer
        accountId:
          type: integer
        note:
          type: string
        tags:
          type: string
        source:
          type: string
        occurredAt:
          type: string
          format: date-time
        category:
          $ref: '#/components/schemas/Category'
        account:
          $ref: '#/components/schemas/Account'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TransactionRequest:
      type: object
      additionalProperties: false
      required: [type, amount, categoryId, accountId, note]
      example:
        type: expense
        amount: 35.8
        categoryId: 2
        accountId: 1
        note: 午餐
        tags:
          - 工作日
        occurredAt: '2026-06-20T12:30:00+08:00'
        source: manual
      properties:
        type:
          $ref: '#/components/schemas/TransactionType'
        amount:
          type: number
          exclusiveMinimum: 0
          multipleOf: 0.01
        categoryId:
          type: integer
          minimum: 1
        accountId:
          type: integer
          minimum: 1
        note:
          type: string
          minLength: 1
        tags:
          type: array
          items:
            type: string
        occurredAt:
          type: string
          format: date-time
        source:
          type: string
    TransactionListResponse:
      type: object
      additionalProperties: false
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        pagination:
          $ref: '#/components/schemas/Pagination'
    Pagination:
      type: object
      additionalProperties: false
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 200
        total:
          type: integer
          minimum: 0
    AIParseRequest:
      type: object
      additionalProperties: false
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
    AIParseResult:
      type: object
      additionalProperties: false
      required: [type, amount, category, account, note, occurredAt, confidence]
      properties:
        type:
          $ref: '#/components/schemas/TransactionType'
        amount:
          type: number
        category:
          type: string
        account:
          type: string
        note:
          type: string
        occurredAt:
          type: string
          format: date-time
        confidence:
          type: number
          minimum: 0
          maximum: 1
    AIParseResponse:
      type: object
      additionalProperties: false
      required: [requiresConfirmation, cached, result]
      properties:
        requiresConfirmation:
          type: boolean
        cached:
          type: boolean
        result:
          $ref: '#/components/schemas/AIParseResult'
    CategoryStat:
