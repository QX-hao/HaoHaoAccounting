        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
  /transactions:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    get:
      tags: [transactions]
      operationId: getTransactions
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: start
          in: query
          description: Inclusive start datetime. Accepts RFC3339, YYYY-MM-DD, YYYY-MM-DD HH:mm:ss, or YYYY/MM/DD.
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          description: Inclusive end datetime. Date-only values cover the entire day. Accepts RFC3339, YYYY-MM-DD, YYYY-MM-DD HH:mm:ss, or YYYY/MM/DD.
          schema:
            type: string
            format: date-time
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TransactionType'
        - name: categoryId
          in: query
          schema:
            type: integer
            minimum: 1
        - name: accountId
          in: query
          schema:
            type: integer
            minimum: 1
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Transaction list
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
            Link:
              $ref: '#/components/headers/Link'
            X-Total-Count:
              $ref: '#/components/headers/TotalCount'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
    post:
      tags: [transactions]
      operationId: postTransactions
      requestBody:
        required: true
        content:
