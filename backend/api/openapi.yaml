      properties:
        current:
          $ref: '#/components/schemas/PeriodTotals'
        previous:
          $ref: '#/components/schemas/PeriodTotals'
    Summary:
      type: object
      additionalProperties: false
      required: [start, end, income, expense, balance, byCategory, byAccount, monthlyTrend, trendGranularity, trend, categoryTrend, accountBalanceTrend, budgetExecution, dailySummaries, monthlySummaries, periodCompare]
      properties:
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        income:
          type: number
        expense:
          type: number
        balance:
          type: number
        byCategory:
          type: array
          items:
            $ref: '#/components/schemas/CategoryStat'
        byAccount:
          type: array
          items:
            $ref: '#/components/schemas/AccountStat'
        monthlyTrend:
          type: array
          items:
            $ref: '#/components/schemas/MonthTrend'
        trendGranularity:
          type: string
        trend:
          type: array
          items:
            $ref: '#/components/schemas/TrendPoint'
        categoryTrend:
          type: array
          items:
            $ref: '#/components/schemas/CategoryTrendPoint'
        accountBalanceTrend:
          type: array
          items:
            $ref: '#/components/schemas/AccountBalancePoint'
        budgetExecution:
          type: array
          items:
            $ref: '#/components/schemas/BudgetExecution'
        dailySummaries:
          type: array
          items:
            $ref: '#/components/schemas/SummaryTableRow'
        monthlySummaries:
          type: array
          items:
            $ref: '#/components/schemas/SummaryTableRow'
        periodCompare:
          $ref: '#/components/schemas/PeriodCompare'
    ImportFileRequest:
      type: object
      additionalProperties: false
      description: CSV/XLSX import file. The first row must start with occurred_at,type,amount,category,account,note,tags; a UTF-8 BOM on the first header is accepted and additional columns are ignored.
      required: [file]
      properties:
        file:
          type: string
          format: binary
          description: CSV or XLSX file. The first row must start with occurred_at,type,amount,category,account,note,tags; a UTF-8 BOM on the first header is accepted.
        skipDuplicates:
          type: boolean
          description: skipDuplicates defaults to true when omitted; invalid values return invalid_request.
          default: true
    ImportTextRequest:
      type: object
      additionalProperties: false
      required: [content]
      properties:
        filename:
          type: string
        content:
          type: string
          description: CSV text. The first row must start with occurred_at,type,amount,category,account,note,tags; a UTF-8 BOM on the first header is accepted.
          minLength: 1
          maxLength: 5242880
        skipDuplicates:
          type: boolean
          description: skipDuplicates defaults to true when omitted.
          default: true
    ImportPreviewRow:
      type: object
      additionalProperties: false
      required: [line, occurredAt, type, amount, category, account, note, tags, valid, duplicate]
      properties:
        line:
          type: integer
        occurredAt:
          type: string
        type:
          $ref: '#/components/schemas/TransactionType'
        amount:
          type: number
        category:
          type: string
        account:
          type: string
        note:
          type: string
        tags:
          type: string
        valid:
          type: boolean
        duplicate:
          type: boolean
        error:
          type: string
        duplicateReason:
          type: string
    ImportPreview:
      type: object
      additionalProperties: false
      required: [filename, size, totalRows, validRows, failedRows, duplicateRows, maxRows, maxFileBytes, truncated, rows]
      properties:
        filename:
          type: string
        size:
          type: integer
        totalRows:
          type: integer
          description: Non-empty data rows excluding the header and blank rows.
        validRows:
          type: integer
        failedRows:
          type: integer
        duplicateRows:
          type: integer
        maxRows:
          type: integer
        maxFileBytes:
          type: integer
        truncated:
          type: boolean
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ImportPreviewRow'
    ImportResult:
      type: object
      additionalProperties: false
      required: [total, success, failed, skipped, errors]
      properties:
        total:
          type: integer
        success:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string
    ImportJob:
      type: object
      additionalProperties: false
      required: [id, filename, status, total, success, failed, skipped, errors, createdAt, updatedAt]
      properties:
        id:
          type: integer
        filename:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed]
        total:
          type: integer
        success:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error, code, status, requestId]
      example:
        error: invalid Authorization format
        code: unauthorized
        status: 401
        requestId: api-20260620-example
      properties:
        error:
          type: string
        code:
          type: string
          enum: [bad_request, invalid_request, unauthorized, forbidden, not_found, method_not_allowed, rate_limited, payload_too_large, unsupported_media_type, not_acceptable, request_timeout, client_closed_request, internal_error]
        status:
          type: integer
          minimum: 400
          maximum: 599
        requestId:
          type: string
    OkResponse:
      type: object
      additionalProperties: false
      required: [ok]
      properties:
        ok:
          type: boolean
