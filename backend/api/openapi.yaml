openapi: 3.0.3
info:
  title: HaoHaoAccounting API
  version: 0.1.0
servers:
  - url: http://localhost:8080/api/v1
tags:
  - name: auth
    description: Authentication and current user endpoints.
  - name: accounts
    description: Account management endpoints.
  - name: budgets
    description: Budget management endpoints.
  - name: categories
    description: Category management endpoints.
  - name: transactions
    description: Transaction management endpoints.
  - name: ai
    description: AI assisted parsing endpoints.
  - name: reports
    description: Reporting and analytics endpoints.
  - name: dataio
    description: Import and export endpoints.
security:
  - bearerAuth: []
paths:
  /auth/login:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    post:
      tags: [auth]
      operationId: postAuthLogin
      summary: Log in with username and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.signature
                user:
                  id: 1
                  name: 好好用户
                  username: admin
                  phone: ''
                  email: ''
                  wechatId: ''
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '400':
          $ref: '#/components/responses/BadRequest'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /auth/refresh:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    post:
      tags: [auth]
      operationId: postAuthRefresh
      summary: Refresh the current access token
      responses:
        '200':
          description: Refreshed token
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
  /auth/logout:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    post:
      tags: [auth]
      operationId: postAuthLogout
      summary: Log out the current user
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
  /me:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    get:
      tags: [auth]
      operationId: getMe
      summary: Get the current user profile
      responses:
        '200':
          description: Current user
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
  /accounts:
