        '504':
          $ref: '#/components/responses/GatewayTimeout'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    RequestID:
      name: X-Request-ID
      in: header
      required: false
      description: Optional request correlation id. The API returns this value when valid, otherwise it generates one.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[!-~]+$'
  headers:
    RequestID:
      description: Request correlation id for tracing logs and API calls.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[!-~]+$'
    Link:
      description: RFC 8288 pagination links for first, previous, next, and last pages when available.
      schema:
        type: string
    TotalCount:
      description: Total number of records matching the query before pagination.
      schema:
        type: integer
        minimum: 0
    ContentDisposition:
      description: Attachment disposition for downloaded files. Includes both filename and RFC 5987 filename* parameters.
      schema:
        type: string
    CacheControl:
      description: Cache policy for API responses containing user or authentication data.
      schema:
        type: string
        enum: [no-store]
    Pragma:
      description: Legacy HTTP/1.0 cache policy retained for intermediary compatibility.
      schema:
        type: string
        enum: [no-cache]
    Expires:
      description: Legacy cache expiry value retained for intermediary compatibility.
      schema:
        type: string
        enum: ['0']
    Vary:
      description: Request headers that influenced response representation selection.
      schema:
        type: string
    Allow:
      description: HTTP methods supported by the target route.
      schema:
        type: string
    WWWAuthenticate:
      description: Authentication challenge for protected resources. Invalid bearer tokens include error="invalid_token" per RFC 6750.
      schema:
        type: string
    RetryAfter:
      description: Retry delay as either HTTP-date or delay-seconds.
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request or validation error.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing, invalid, or expired authentication token.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
        WWW-Authenticate:
          $ref: '#/components/headers/WWWAuthenticate'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated user cannot perform this action.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource was not found.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    MethodNotAllowed:
      description: HTTP method is not supported for this route.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
        Allow:
          $ref: '#/components/headers/Allow'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Too many requests.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PayloadTooLarge:
      description: Request body is too large.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnsupportedMediaType:
      description: Request Content-Type is not supported by this operation.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotAcceptable:
      description: Requested response media type is not available for this operation.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        Vary:
          $ref: '#/components/headers/Vary'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    GatewayTimeout:
      description: Request processing exceeded the server timeout budget.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error:
      description: Error response. Prefer a status-specific response component when possible.
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Ok:
      description: OK response
      headers:
        Cache-Control:
          $ref: '#/components/headers/CacheControl'
        Pragma:
          $ref: '#/components/headers/Pragma'
        Expires:
          $ref: '#/components/headers/Expires'
        Vary:
          $ref: '#/components/headers/Vary'
        X-Request-ID:
          $ref: '#/components/headers/RequestID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OkResponse'
  schemas:
    TransactionType:
      type: string
      enum: [income, expense]
    CurrentUser:
      type: object
      additionalProperties: false
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        phone:
          type: string
        email:
          type: string
        wechatId:
          type: string
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    LoginResponse:
      type: object
      additionalProperties: false
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/CurrentUser'
    Account:
      type: object
      additionalProperties: false
      required: [id, userId, name, type, balance]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        type:
          type: string
        balance:
          type: number
    AccountRequest:
      type: object
      additionalProperties: false
      required: [name, type]
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          minLength: 1
        balance:
          type: number
          minimum: 0
          multipleOf: 0.01
    Budget:
      type: object
      additionalProperties: false
      required: [id, userId, month, categoryId, amount]
      properties:
        id:
          type: integer
        userId:
          type: integer
        month:
          type: string
        categoryId:
          type: integer
        amount:
          type: number
    BudgetRequest:
      type: object
      additionalProperties: false
      required: [month, amount]
      properties:
        month:
          type: string
          pattern: '^\d{4}-\d{2}$'
        categoryId:
          type: integer
          minimum: 1
        amount:
          type: number
          minimum: 0
          multipleOf: 0.01
    Category:
      type: object
      additionalProperties: false
      required: [id, name, type, isSystem]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        type:
          $ref: '#/components/schemas/TransactionType'
        isSystem:
          type: boolean
    CategoryRequest:
      type: object
      additionalProperties: false
      required: [name, type]
      properties:
        name:
          type: string
          minLength: 1
        type:
          $ref: '#/components/schemas/TransactionType'
    Transaction:
      type: object
      additionalProperties: false
      required: [id, userId, type, amount, categoryId, accountId, note, tags, source, occurredAt, category, account]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          $ref: '#/components/schemas/TransactionType'
        amount:
          type: number
        categoryId:
          type: integer
        accountId:
          type: integer
        note:
          type: string
        tags:
          type: string
        source:
          type: string
        occurredAt:
          type: string
          format: date-time
        category:
          $ref: '#/components/schemas/Category'
        account:
          $ref: '#/components/schemas/Account'
    TransactionRequest:
      type: object
      additionalProperties: false
      required: [type, amount, categoryId, accountId, note]
      properties:
        type:
          $ref: '#/components/schemas/TransactionType'
        amount:
          type: number
          exclusiveMinimum: 0
          multipleOf: 0.01
        categoryId:
          type: integer
          minimum: 1
        accountId:
          type: integer
          minimum: 1
        note:
          type: string
          minLength: 1
        tags:
          type: array
          items:
            type: string
        occurredAt:
          type: string
          format: date-time
        source:
          type: string
    TransactionListResponse:
      type: object
      additionalProperties: false
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        pagination:
          $ref: '#/components/schemas/Pagination'
    Pagination:
