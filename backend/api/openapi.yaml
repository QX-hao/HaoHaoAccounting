openapi: 3.0.3
info:
  title: HaoHaoAccounting API
  version: 0.1.0
  description: |
    Cross-origin browser requests must come from an origin configured in CORS_ALLOW_ORIGINS.
    Requests from other origins are rejected by CORS middleware with 403 before route handlers run
    and do not include Access-Control-Allow-Origin.
servers:
  - url: http://localhost:8080/api/v1
    description: Local development API server.
tags:
  - name: auth
    description: Authentication and current user endpoints.
  - name: accounts
    description: Account management endpoints.
  - name: budgets
    description: Budget management endpoints.
  - name: categories
    description: Category management endpoints.
  - name: transactions
    description: Transaction management endpoints.
  - name: ai
    description: AI assisted parsing endpoints.
  - name: reports
    description: Reporting and analytics endpoints.
  - name: dataio
    description: Import and export endpoints.
security:
  - bearerAuth: []
paths:
  /auth/login:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    post:
      tags: [auth]
      operationId: postAuthLogin
      summary: Log in with username and password
      description: Verifies the configured admin credentials and returns a bearer token plus the current user profile.
      security: []
      requestBody:
        description: Username and password credentials for starting an authenticated session.
        required: true
        content:
          application/json:
            description: 'Accepts `Content-Type: application/json`, optional media type parameters such as `charset=utf-8`, and `application/*+json` structured JSON media types.'
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.signature
                user:
                  id: 1
                  name: 好好用户
                  username: admin
                  phone: ''
                  email: ''
                  wechatId: ''
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /auth/refresh:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    post:
      tags: [auth]
      operationId: postAuthRefresh
      summary: Refresh the current access token
      description: Issues a fresh token for the authenticated user without changing the user profile.
      responses:
        '200':
          description: Refreshed token
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
  /auth/logout:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    post:
      tags: [auth]
      operationId: postAuthLogout
      summary: Log out the current user
      description: Revokes the presented bearer token so it cannot be used for later authenticated requests.
      responses:
        '200':
          description: Logout success
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
            Clear-Site-Data:
              $ref: '#/components/headers/ClearSiteData'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
  /me:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    get:
      tags: [auth]
      operationId: getMe
      summary: Get the current user profile
      description: Returns the profile associated with the authenticated bearer token.
      responses:
        '200':
          description: Current user
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
  /accounts:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    get:
      tags: [accounts]
      operationId: getAccounts
      summary: List accounts
      description: Returns all accounts available to the authenticated user.
      responses:
        '200':
          description: Account list
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
    post:
      tags: [accounts]
      operationId: postAccounts
      summary: Create an account
      description: Creates a new account with its opening balance and metadata.
      requestBody:
        description: Account details to create.
        required: true
        content:
          application/json:
            description: 'Accepts `Content-Type: application/json`, optional media type parameters such as `charset=utf-8`, and `application/*+json` structured JSON media types.'
            schema:
              $ref: '#/components/schemas/AccountRequest'
      responses:
        '201':
          description: Created account
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Location:
              $ref: '#/components/headers/Location'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /accounts/{id}:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    put:
      tags: [accounts]
      operationId: putAccountsById
      summary: Update an account
      description: Replaces an existing account with the supplied account details.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        description: Complete account details to replace the existing account.
        required: true
        content:
          application/json:
            description: 'Accepts `Content-Type: application/json`, optional media type parameters such as `charset=utf-8`, and `application/*+json` structured JSON media types.'
            schema:
              $ref: '#/components/schemas/AccountRequest'
      responses:
        '200':
          description: Updated account
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
    delete:
      tags: [accounts]
      operationId: deleteAccountsById
      summary: Delete an account
      description: Deletes the selected account when it is not blocked by related ledger data.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
  /budgets:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    get:
      tags: [budgets]
      operationId: getBudgets
      summary: List budgets
      description: Returns budgets, optionally filtered to a specific YYYY-MM month.
      parameters:
        - name: month
          in: query
          description: Budget month in YYYY-MM format.
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
          example: '2026-06'
      responses:
        '200':
          description: Budget list
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Budget'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
    post:
      tags: [budgets]
      operationId: postBudgets
      summary: Create a budget
      description: Creates a monthly budget for a category.
      requestBody:
        description: Monthly category budget details to create.
        required: true
        content:
          application/json:
            description: 'Accepts `Content-Type: application/json`, optional media type parameters such as `charset=utf-8`, and `application/*+json` structured JSON media types.'
            schema:
              $ref: '#/components/schemas/BudgetRequest'
      responses:
        '201':
          description: Created budget
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Location:
              $ref: '#/components/headers/Location'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /budgets/{id}:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    put:
      tags: [budgets]
      operationId: putBudgetsById
      summary: Update a budget
      description: Replaces an existing monthly budget with the supplied budget details.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        description: Complete monthly budget details to replace the existing budget.
        required: true
        content:
          application/json:
            description: 'Accepts `Content-Type: application/json`, optional media type parameters such as `charset=utf-8`, and `application/*+json` structured JSON media types.'
            schema:
              $ref: '#/components/schemas/BudgetRequest'
      responses:
        '200':
          description: Updated budget
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
    delete:
      tags: [budgets]
      operationId: deleteBudgetsById
      summary: Delete a budget
      description: Deletes the selected monthly budget.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
  /categories:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    get:
      tags: [categories]
      operationId: getCategories
      summary: List categories
      description: Returns categories, optionally filtered by transaction type.
      parameters:
        - name: type
          in: query
          description: Transaction type filter.
          schema:
            $ref: '#/components/schemas/TransactionType'
          example: expense
      responses:
        '200':
          description: Category list
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
    post:
      tags: [categories]
      operationId: postCategories
      summary: Create a category
      description: Creates a category for classifying income or expense transactions.
      requestBody:
        description: Category details to create.
        required: true
        content:
          application/json:
            description: 'Accepts `Content-Type: application/json`, optional media type parameters such as `charset=utf-8`, and `application/*+json` structured JSON media types.'
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '201':
          description: Created category
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Location:
              $ref: '#/components/headers/Location'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /categories/{id}:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    put:
      tags: [categories]
      operationId: putCategoriesById
      summary: Update a category
      description: Replaces an existing category with the supplied category details.
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        description: Complete category details to replace the existing category.
        required: true
        content:
          application/json:
            description: 'Accepts `Content-Type: application/json`, optional media type parameters such as `charset=utf-8`, and `application/*+json` structured JSON media types.'
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '200':
          description: Updated category
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControl'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
            Vary:
              $ref: '#/components/headers/Vary'
            X-Request-ID:
              $ref: '#/components/headers/RequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
    delete:
      tags: [categories]
      operationId: deleteCategoriesById
      summary: Delete a category
      description: Deletes the selected category when it is not blocked by related ledger data.
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
        '499':
          $ref: '#/components/responses/ClientClosedRequest'
  /transactions:
    parameters:
      - $ref: '#/components/parameters/RequestID'
    get:
      tags: [transactions]
      operationId: getTransactions
      summary: List transactions
      description: Returns paginated transactions filtered by date range, type, category, account, or keyword.
      parameters:
        - name: page
          in: query
          description: Page number. Defaults to 1 when omitted.
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: pageSize
          in: query
          description: Number of items per page. Defaults to 20 when omitted.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
          example: 20
        - name: start
          in: query
          description: Inclusive start datetime. Accepts RFC3339, YYYY-MM-DD, YYYY-MM-DD HH:mm:ss, or YYYY/MM/DD.
          schema:
            type: string
            format: date-time
          example: '2026-06-01T00:00:00+08:00'
        - name: end
          in: query
          description: Inclusive end datetime. Date-only values cover the entire day. Accepts RFC3339, YYYY-MM-DD, YYYY-MM-DD HH:mm:ss, or YYYY/MM/DD.
          schema:
            type: string
            format: date-time
          example: '2026-06-30'
        - name: type
          in: query
          description: Transaction type filter.
