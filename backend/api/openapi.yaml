      properties:
        period:
          type: string
        income:
          type: number
        expense:
          type: number
    CategoryTrendPoint:
      type: object
      additionalProperties: false
      required: [period, categoryId, category, amount]
      properties:
        period:
          type: string
        categoryId:
          type: integer
        category:
          type: string
        amount:
          type: number
    AccountBalancePoint:
      type: object
      additionalProperties: false
      required: [period, accountId, account, net, balance]
      properties:
        period:
          type: string
        accountId:
          type: integer
        account:
          type: string
        net:
          type: number
        balance:
          type: number
    BudgetExecution:
      type: object
      additionalProperties: false
      required: [budgetId, month, categoryId, category, budget, expense, remaining, usageRate]
      properties:
        budgetId:
          type: integer
        month:
          type: string
        categoryId:
          type: integer
        category:
          type: string
        budget:
          type: number
        expense:
          type: number
        remaining:
          type: number
        usageRate:
          type: number
    SummaryTableRow:
      type: object
      additionalProperties: false
      required: [period, income, expense, balance, txCount]
      properties:
        period:
          type: string
        income:
          type: number
        expense:
          type: number
        balance:
          type: number
        txCount:
          type: integer
    PeriodTotals:
      type: object
      additionalProperties: false
      required: [income, expense]
      properties:
        income:
          type: number
        expense:
          type: number
    PeriodCompare:
      type: object
      additionalProperties: false
