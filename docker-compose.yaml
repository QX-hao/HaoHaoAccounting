# Production compose file.
#
# Before deployment, replace NEXT_PUBLIC_API_BASE with the public URL that the
# user's browser can use to reach the backend, for example:
# https://api.example.com/api/v1
#
# This file defaults the app to PostgreSQL + Redis. MySQL is included as an
# optional profile because the backend uses either PostgreSQL or MySQL, not both.

name: haohaoaccounting

x-app-security: &app-security
  init: true
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  web:
    <<: *app-security
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:?set NEXT_PUBLIC_API_BASE, for example https://api.example.com/api/v1}
    image: haohaoaccounting-web:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:?set NEXT_PUBLIC_API_BASE, for example https://api.example.com/api/v1}
    ports:
      - "3000:3000"
    tmpfs:
      - /tmp
      - /app/.next/cache
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - public
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend:
    <<: *app-security
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: haohaoaccounting-backend:latest
    restart: unless-stopped
    stop_grace_period: ${BACKEND_STOP_GRACE_PERIOD:-30s}
    environment:
      GIN_MODE: release
      PORT: 8080
      DB_DRIVER: postgres
      DB_DSN: "host=postgres user=haohao password=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD} dbname=haohaoaccounting port=5432 sslmode=disable TimeZone=Asia/Shanghai"
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-1h}
      DB_CONN_MAX_IDLE_TIME: ${DB_CONN_MAX_IDLE_TIME:-30m}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      REDIS_DB: 0
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET with at least 32 characters}
      JWT_TTL: ${JWT_TTL:-168h}
      JWT_CLOCK_SKEW: ${JWT_CLOCK_SKEW:-30s}
      JWT_ISSUER: ${JWT_ISSUER:-haohao-accounting}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-haohao-accounting-api}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?set ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      ADMIN_NAME: 好好用户
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:?set CORS_ALLOW_ORIGINS}
      LOGIN_RATE_LIMIT_MAX_FAILURES: ${LOGIN_RATE_LIMIT_MAX_FAILURES:-5}
      LOGIN_RATE_LIMIT_WINDOW: ${LOGIN_RATE_LIMIT_WINDOW:-10m}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-15s}
      HTTP_READ_HEADER_TIMEOUT: ${HTTP_READ_HEADER_TIMEOUT:-5s}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-30s}
      HTTP_IDLE_TIMEOUT: ${HTTP_IDLE_TIMEOUT:-60s}
      HTTP_SHUTDOWN_TIMEOUT: ${HTTP_SHUTDOWN_TIMEOUT:-10s}
      HTTP_REQUEST_TIMEOUT: ${HTTP_REQUEST_TIMEOUT:-0s}
      HTTP_MAX_HEADER_BYTES: ${HTTP_MAX_HEADER_BYTES:-1048576}
      HTTP_MAX_BODY_BYTES: ${HTTP_MAX_BODY_BYTES:-6291456}
      HTTP_HSTS_MAX_AGE_SECONDS: ${HTTP_HSTS_MAX_AGE_SECONDS:-0}
      HTTP_HSTS_INCLUDE_SUBDOMAINS: ${HTTP_HSTS_INCLUDE_SUBDOMAINS:-false}
      HTTP_HSTS_PRELOAD: ${HTTP_HSTS_PRELOAD:-false}
    ports:
      - "8080:8080"
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - public
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8080/readyz >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: haohaoaccounting-postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: haohaoaccounting
      POSTGRES_USER: haohao
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    build:
      context: .
      dockerfile: Dockerfile.redis
    image: haohaoaccounting-redis:7
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD:?set REDIS_PASSWORD}",
      ]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    profiles:
      - mysql
    build:
      context: .
      dockerfile: Dockerfile.mysql
    image: haohaoaccounting-mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: haohaoaccounting
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    expose:
      - "3306"
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  mysql_data:

networks:
  public:
  internal:
    internal: true
