# Local test environment compose file.
#
# This file is for local development and testing only. It starts PostgreSQL,
# Redis, and optional MySQL with simple local credentials and host port mappings.
# Production deployment should use docker-compose.yaml instead.

services:
  postgres:
    image: postgres:16
    container_name: haohao-local-test-postgres
    environment:
      POSTGRES_DB: haohaoaccounting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: haohao123
    ports:
      - "55432:5432"
    volumes:
      - haohao_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: haohao-local-test-redis
    ports:
      - "56379:6379"
    command:
      [
        "sh",
        "-c",
        "umask 077 && printf 'appendonly yes\nrequirepass %s\n' \"$${REDIS_PASSWORD}\" > /tmp/redis.conf && exec redis-server /tmp/redis.conf",
      ]
    environment:
      REDIS_PASSWORD: haohao123
    volumes:
      - haohao_redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep PONG",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4
    container_name: haohao-local-test-mysql
    profiles:
      - mysql
    environment:
      MYSQL_DATABASE: haohaoaccounting
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "53306:3306"
    volumes:
      - haohao_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "MYSQL_PWD=\"$${MYSQL_ROOT_PASSWORD}\" mysqladmin ping -h 127.0.0.1 -uroot --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  haohao_pg_data:
  haohao_mysql_data:
  haohao_redis_data:
