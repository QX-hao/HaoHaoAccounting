version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    # 普通版本更新按周集中处理，避免 bot 分支和 PR 在工作日内不断分散注意力。
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    target-branch: dev-pxhao
    # 关闭自动 rebase，减少只为刷新分支产生的 bot 提交噪音；需要时由维护者手动触发。
    rebase-strategy: disabled
    commit-message:
      prefix: deps(actions)
    labels:
      - dependencies
      - github-actions
    # 使用单层分支名，避免 dependabot/... 多级分支和本仓库分支约定不一致。
    pull-request-branch-name:
      separator: "-"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        # 常规 minor/patch 更新集中处理；major 升级保持单独 PR，方便单独评估破坏性变更。
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: gomod
    directory: /backend
    # Go 模块经常连带升级，集中成一个 PR 更容易完整跑完后端验证。
    schedule:
      interval: weekly
      day: monday
      time: "09:10"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    target-branch: dev-pxhao
    # 关闭自动 rebase，减少只为刷新分支产生的 bot 提交噪音；需要时由维护者手动触发。
    rebase-strategy: disabled
    commit-message:
      prefix: deps(backend)
    labels:
      - dependencies
      - backend
      - go
    # 使用单层分支名，避免 dependabot/... 多级分支和本仓库分支约定不一致。
    pull-request-branch-name:
      separator: "-"
    cooldown:
      default-days: 7
    groups:
      go-modules:
        # 常规 minor/patch 更新集中处理；major 升级保持单独 PR，方便单独评估破坏性变更。
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /web
    # Web 依赖按 lockfile 分组更新，减少多个互相冲突的前端 PR。
    schedule:
      interval: weekly
      day: monday
      time: "09:20"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    target-branch: dev-pxhao
    # 关闭自动 rebase，减少只为刷新分支产生的 bot 提交噪音；需要时由维护者手动触发。
    rebase-strategy: disabled
    # npm 应用优先更新 lockfile；只有当前 semver 范围无法覆盖新版本时才改 package.json。
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: deps(web)
    labels:
      - dependencies
      - web
      - npm
    # 使用单层分支名，避免 dependabot/... 多级分支和本仓库分支约定不一致。
    pull-request-branch-name:
      separator: "-"
    cooldown:
      default-days: 7
    groups:
      web-npm:
        # 常规 minor/patch 更新集中处理；major 升级保持单独 PR，方便单独评估破坏性变更。
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /mobile
    # Mobile 依赖单独分组，避免和 Web 的 React/构建链更新混在一起。
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    target-branch: dev-pxhao
    # 关闭自动 rebase，减少只为刷新分支产生的 bot 提交噪音；需要时由维护者手动触发。
    rebase-strategy: disabled
    # npm 应用优先更新 lockfile；只有当前 semver 范围无法覆盖新版本时才改 package.json。
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: deps(mobile)
    labels:
      - dependencies
      - mobile
      - npm
    # 使用单层分支名，避免 dependabot/... 多级分支和本仓库分支约定不一致。
    pull-request-branch-name:
      separator: "-"
    cooldown:
      default-days: 7
    groups:
      mobile-npm:
        # 常规 minor/patch 更新集中处理；major 升级保持单独 PR，方便单独评估破坏性变更。
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directories:
      - /
      - /backend
      - /web
      - /mobile
    # Docker 基础镜像使用多目录配置集中维护，减少同一生态的 bot 分支和重复 PR。
    schedule:
      interval: weekly
      day: monday
      time: "09:40"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    target-branch: dev-pxhao
    # 关闭自动 rebase，减少只为刷新分支产生的 bot 提交噪音；需要时由维护者手动触发。
    rebase-strategy: disabled
    commit-message:
      prefix: deps(docker)
    labels:
      - dependencies
      - docker
    # 使用单层分支名，避免 dependabot/... 多级分支和本仓库分支约定不一致。
    pull-request-branch-name:
      separator: "-"
    cooldown:
      default-days: 7
    groups:
      docker-images:
        # 常规 minor/patch 更新集中处理；major 升级保持单独 PR，方便单独评估破坏性变更。
        patterns:
          - "*"
        update-types:
          - minor
          - patch
