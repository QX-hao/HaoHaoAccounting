version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    # 普通版本更新按周集中处理，避免 bot 分支和 PR 在工作日内不断分散注意力。
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /backend
    # Go 模块经常连带升级，集中成一个 PR 更容易完整跑完后端验证。
    schedule:
      interval: weekly
      day: monday
      time: "09:10"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      go-modules:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /web
    # Web 依赖按 lockfile 分组更新，减少多个互相冲突的前端 PR。
    schedule:
      interval: weekly
      day: monday
      time: "09:20"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      web-npm:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /mobile
    # Mobile 依赖单独分组，避免和 Web 的 React/构建链更新混在一起。
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      mobile-npm:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    # Docker 基础镜像更新也走限流，减少多个镜像 PR 同时失败后堆积。
    schedule:
      interval: weekly
      day: monday
      time: "09:40"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      root-docker:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:50"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      backend-docker:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      web-docker:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /mobile
    schedule:
      interval: weekly
      day: monday
      time: "10:10"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      mobile-docker:
        patterns:
          - "*"
