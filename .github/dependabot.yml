version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    groups:
      go-modules:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      web-npm:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
    groups:
      mobile-npm:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    groups:
      root-docker:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    groups:
      backend-docker:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly
    groups:
      web-docker:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /mobile
    schedule:
      interval: weekly
    groups:
      mobile-docker:
        patterns:
          - "*"
