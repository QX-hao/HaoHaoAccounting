services:
  postgres:
    image: postgres:16
    container_name: haohao-postgres
    environment:
      POSTGRES_DB: haohaoaccounting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - haohao_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: haohao-redis
    ports:
      - "56379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - haohao_redis_data:/data

  mysql:
    image: mysql:8.4
    container_name: haohao-mysql
    profiles:
      - mysql
    environment:
      MYSQL_DATABASE: haohaoaccounting
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "53306:3306"
    volumes:
      - haohao_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  haohao_pg_data:
  haohao_mysql_data:
  haohao_redis_data:
